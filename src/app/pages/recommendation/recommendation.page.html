<div class="rec-page">
  <div class="page-header">
    <a mat-icon-button routerLink="/">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <div>
      <h1>{{ machine()?.name ?? 'Machine' }}</h1>
      <span class="subtitle">{{ machine()?.location }} · Maintenance Recommendation</span>
    </div>
  </div>

  <mat-card class="sim-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>tune</mat-icon> Simulation Parameters
      </mat-card-title>
      <mat-card-subtitle>
        Adjust to simulate different ML prediction scenarios
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" class="sim-form">
        <mat-form-field appearance="outline">
          <mat-label>Failure Probability (0-1)</mat-label>
          <input matInput type="number" step="0.05" formControlName="failureProbability">
          <mat-hint>e.g. 0.85 = 85% probability</mat-hint>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Days Until Predicted Failure</mat-label>
          <input matInput type="number" formControlName="daysUntilPredictedFailure">
        </mat-form-field>
        <button mat-flat-button color="primary"
                [disabled]="form.invalid || loading()"
                (click)="loadRecommendation()">
          <mat-spinner *ngIf="loading()" diameter="18"></mat-spinner>
          <mat-icon *ngIf="!loading()">refresh</mat-icon>
          Recalculate
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <div *ngIf="loading()" class="loading-center">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <app-recommendation-card
    *ngIf="recommendation() && !loading()"
    [recommendation]="recommendation()!">
  </app-recommendation-card>

  <div class="cost-section" *ngIf="machineId()">
    <h3>Cost Analysis</h3>
    <app-cost-comparison [preselectedMachineId]="machineId()!"></app-cost-comparison>
  </div>
</div>
