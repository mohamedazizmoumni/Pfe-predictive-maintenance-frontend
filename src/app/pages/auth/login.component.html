<div class="login-shell">
  <div class="login-background">
    <div class="glow"></div>
  </div>

  <div class="login-center">
    <section class="login-card">
      <header class="login-header">
        <span class="eyebrow">Sentinel Guardian</span>
        <h1>Secure Access</h1>
        <p class="subtitle">Predictive maintenance cockpit for critical assets.</p>
      </header>

      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="input-group" [class.has-error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            class="ui-input"
            placeholder="Enter your username"
            autocomplete="username"
          />
          <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="field-error">
            Username is required
          </div>
        </div>

        <div class="input-group" [class.has-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="getPasswordType()"
              formControlName="password"
              class="ui-input"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
              👁️
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="field-error">
            Invalid password
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>

        <button type="submit" class="login-btn" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Access Sentinel</span>
          <span *ngIf="isLoading" class="loading">
            <span class="spinner" aria-hidden="true"></span>
            Authorizing...
          </span>
        </button>
      </form>
      <div class="footnote">       
        <p class="register-cta">Need access? <a routerLink="/auth/register">Request onboarding</a></p>
      </div>
    </section>
  </div>
</div>
