<div class="face-login-shell">
  <div class="face-login-card">
    <header class="header">
      <h1>Face Recognition Login</h1>
      <p>Align your face in the frame, capture, then authenticate.</p>
    </header>

    <div class="camera-block">
      <video #videoElement autoplay playsinline muted></video>
      <canvas #captureCanvas class="hidden-canvas"></canvas>
    </div>

    <div class="actions">
      <button type="button" class="secondary-btn" (click)="captureFace()" [disabled]="isLoading || !cameraReady">
        Capture Face
      </button>

      <button type="button" class="primary-btn" (click)="loginWithFace()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Login with Face</span>
        <span *ngIf="isLoading" class="loading">
          <span class="spinner" aria-hidden="true"></span>
          Processing...
        </span>
      </button>
    </div>

    <div class="upload-fallback">
      <label for="face-file">Or upload an image</label>
      <input id="face-file" type="file" accept="image/*" (change)="onFileSelected($event)" [disabled]="isLoading" />
    </div>

    <div *ngIf="capturedPreviewUrl" class="preview">
      <p>Selected image preview</p>
      <img [src]="capturedPreviewUrl" alt="Captured face preview" />
    </div>

    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

    <p class="switch-auth">
      Prefer password login?
      <a routerLink="/auth/login">Go to standard login</a>
    </p>
  </div>
</div>
