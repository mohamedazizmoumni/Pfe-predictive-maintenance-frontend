<div class="part-form-container">
  <h2>{{ isEdit ? 'Edit Part' : 'Add New Part' }}</h2>
  <form [formGroup]="partForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" formControlName="name" required />
    </div>
    <div class="form-group">
      <label for="partNumber">Part Number</label>
      <input id="partNumber" formControlName="partNumber" required />
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <input id="category" formControlName="category" />
    </div>
    <div class="form-group">
      <label for="cost">Cost</label>
      <input id="cost" type="number" formControlName="cost" min="0" />
    </div>
    <div class="form-group">
      <label for="minimumStock">Minimum Stock</label>
      <input id="minimumStock" type="number" formControlName="minimumStock" required min="0" />
    </div>
    <div class="form-group">
      <label for="reorderQuantity">Reorder Quantity</label>
      <input id="reorderQuantity" type="number" formControlName="reorderQuantity" min="0" />
    </div>
    <div class="form-group">
      <label for="unit">Unit</label>
      <input id="unit" formControlName="unit" />
    </div>
    <div class="form-group">
      <label for="supplier">Supplier</label>
      <input id="supplier" formControlName="supplier" />
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description"></textarea>
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" formControlName="notes"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" [disabled]="loading || partForm.invalid">
        {{ isEdit ? 'Update' : 'Create' }} Part
      </button>
      <button type="button" (click)="router.navigate(['../'], { relativeTo: route })">Cancel</button>
    </div>
    <div *ngIf="error" class="error">{{ error }}</div>
  </form>
  <div *ngIf="loading" class="loading">Loading...</div>
</div>
