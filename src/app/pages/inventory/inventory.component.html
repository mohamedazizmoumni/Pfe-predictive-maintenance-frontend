<section class="inventory-page">
  <header class="inventory-hero">
    <div class="hero-text">
      <p class="hero-kicker">Warehouse</p>
      <h1 class="hero-title">Inventory</h1>
      <p class="hero-subtitle">
        Maintain optimal spare parts availability and keep procurement aligned.
      </p>
    </div>

    <div class="hero-actions">
      <a class="btn btn-primary" [routerLink]="['/inventory/categories']">Manage Categories</a>
    </div>
  </header>

  <section class="overview-grid">
    <a class="overview-card" *ngFor="let section of sections" [routerLink]="section.path" [attr.data-tone]="section.tone">
      <p class="overview-kicker">Inventory section</p>
      <h2>{{ section.label }}</h2>
      <p>{{ section.description }}</p>
      <span class="overview-link">Open section</span>
    </a>
  </section>
</section>
