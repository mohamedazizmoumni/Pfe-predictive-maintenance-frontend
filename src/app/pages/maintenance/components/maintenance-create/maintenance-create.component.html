<section class="modal" *ngIf="visible">
  <div class="modal-backdrop" (click)="onClose()"></div>

  <div class="modal-card" role="dialog" aria-modal="true">

    <header>
      <div>
        <p>Task Assignment</p>
        <h3>Assign Maintenance Task</h3>
        <span>Select machine and technician, then send a due-date assignment.</span>
      </div>
      <button type="button" class="ghost" (click)="onClose()">✕ Close</button>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <label>
        Task Title
        <input type="text" formControlName="title" placeholder="Motor Inspection" />
      </label>

      <label>
        Machine
        <select formControlName="machineId">
          <option value="" disabled>Select machine</option>
          <option *ngFor="let machine of machines || []" [value]="machine.id">
            {{ getMachineLabel(machine) }}
          </option>
        </select>
      </label>

      <label>
        Priority
        <select formControlName="priority">
          <option *ngFor="let priority of priorities; trackBy: trackByValue" [value]="priority.value">
            {{ priority.label }}
          </option>
        </select>
      </label>

      <div class="split">
        <label>
          Due Date & Time
          <input type="datetime-local" formControlName="dueDate" />
        </label>
      </div>

      <label>
        Assign Technician
        <ng-container *ngIf="(technicians?.length || 0) > 0; else noTechnicians">
          <select formControlName="assignedTechnicianId">
            <option value="" disabled>Select technician</option>
            <!-- [value]="technician.id" sends the numeric ID the backend expects -->
            <option
              *ngFor="let technician of technicians || []; trackBy: trackTechnicianById"
              [value]="technician.id">
              {{ getTechnicianLabel(technician) }}
            </option>
          </select>
        </ng-container>
        <ng-template #noTechnicians>
          <p class="form-hint">No technicians available. A technician must be selected to assign a task.</p>
        </ng-template>
      </label>

      <label>
        Description
        <textarea rows="3" formControlName="description"
          placeholder="Inspect motor vibration anomaly"></textarea>
      </label>

      <footer>
        <button type="button" class="ghost" (click)="onClose()">Cancel</button>
        <button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Assigning…' : 'Assign Task' }}
        </button>
      </footer>

    </form>
  </div>
</section>
