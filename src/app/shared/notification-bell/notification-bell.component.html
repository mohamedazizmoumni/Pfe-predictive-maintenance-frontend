<div class="notification-bell-container">
  <!-- Bell Icon Button -->
  <button class="bell-button" (click)="toggleDropdown()" type="button" title="Notifications">
    <svg
      class="bell-icon"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>

    <!-- Unread Badge -->
    <div *ngIf="(unreadCount$ | async) as unreadCount" [class.unread-badge]="unreadCount > 0">
      <span *ngIf="unreadCount > 0" class="badge-count">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
    </div>
  </button>

  <!-- Dropdown Panel -->
  <div class="dropdown-panel" *ngIf="isOpen" #dropdownPanel [@slideDown]>
    <!-- Header -->
    <div class="dropdown-header">
      <h3 class="dropdown-title">Notifications</h3>
      <button
        *ngIf="(canMarkAllAsRead$ | async) && (unreadCount$ | async) as unreadCount"
        [disabled]="unreadCount === 0"
        (click)="onMarkAllAsRead()"
        class="mark-all-btn"
        type="button"
      >
        Mark all as read
      </button>
    </div>

    <!-- Notifications List -->
    <div class="notifications-list">
      <div *ngIf="(unreadCount$ | async) === 0 && (notifications$ | async) as notifications; else loadingState">
        <div *ngIf="notifications.length === 0" class="empty-state">
          <p>No notifications yet</p>
        </div>
      </div>

      <ng-template #loadingState>
        <div
          *ngFor="let notification of (recentNotifications$ | async)"
          class="notification-item"
          [class.unread]="!notification.isRead"
          [style.border-left-color]="getRiskConfig(notification.riskLevel).color"
          (click)="onNotificationClick(notification)"
        >
          <div class="notification-header">
            <span
              class="risk-icon"
              [style.color]="getRiskConfig(notification.riskLevel).color"
              [title]="notification.riskLevel"
            >
              {{ getRiskConfig(notification.riskLevel).icon }}
            </span>
            <span class="notification-title" [class.bold]="!notification.isRead">
              {{ notification.title }}
            </span>
            <span class="relative-time">{{ getRelativeTime(notification.createdAt) }}</span>
          </div>
          <p class="notification-body">{{ notification.body }}</p>
          <div class="notification-footer" *ngIf="notification.machineId">
            <span class="machine-chip">Machine #{{ notification.machineId }}</span>
          </div>
        </div>
      </ng-template>
    </div>

    <!-- Footer -->
    <div class="dropdown-footer">
      <button class="view-all-btn" (click)="onViewAll()" type="button">
        View all notifications
      </button>
    </div>
  </div>
</div>
